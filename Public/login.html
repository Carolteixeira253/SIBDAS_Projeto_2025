<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedCare Inventory Solutions - Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="assets/img/logo.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/1231343.css">
</head>

<body class="login-body-wrapper">

    <main class="login-body">
        <div class="login-container">
            <div class="login-box">
                
                <div class="login-header">
                    <h2>MedCare</h2>
                    <p>Inventory Solutions</p>
                </div>

                <form id="form-login" action="#" method="POST" onsubmit="return false;">
                    
                    <div class="input-grupo">
                        <label for="utilizador">Utilizador ou E-mail</label>
                        <input type="text" id="utilizador" placeholder="Insira o seu utilizador" required autocomplete="username">
                    </div>

                    <div class="input-grupo">
                        <label for="password">Palavra-passe</label>
                        <input type="password" id="password" placeholder="Insira a sua senha" required autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn-login">Entrar no Sistema</button>
                </form>

                <div class="login-footer">
                    <a href="index.html">← Voltar à Página Principal</a>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
